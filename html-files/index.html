<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mondialito IZI 2026 — Classifica</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --green: #99c667;
    --green-dark: #6a9a3f;
    --green-light: #d6eabc;
    --green-xlight: #f0f8e8;
    --dark: #1a1a1a;
    --gray: #4a4a4a;
    --gray-light: #f5f5f5;
    --white: #ffffff;
    --gold: #f0c040;
    --silver: #c0c0c0;
    --bronze: #c8854a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0e1a0a;
    min-height: 100vh;
    color: var(--dark);
  }

  /* ─── HEADER ─── */
  .header {
    background: #0e1a0a;
    padding: 28px 40px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--green);
  }
  .header-logo img {
    height: 56px;
  }
  .header-title {
    text-align: right;
    color: var(--white);
  }
  .header-title h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--green);
  }
  .header-title p {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    margin-top: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ─── MAIN WRAPPER ─── */
  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ─── LOADING ─── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--white);
  }
  .loading .spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 4px solid rgba(153,198,103,0.2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { margin-top: 16px; font-size: 14px; }

  /* ─── SCOREBOARD ─── */
  #scoreboard { display: none; }

  .meta-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .meta-card {
    background: var(--white);
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
    border-top: 3px solid var(--green);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .meta-card .mc-val {
    font-size: 26px;
    font-weight: 800;
    color: var(--green-dark);
    line-height: 1.1;
  }
  .meta-card .mc-label {
    font-size: 11px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 4px;
  }

  /* ─── PODIUM ─── */
  .podium-section {
    background: var(--white);
    border-radius: 16px;
    padding: 32px 24px 0;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    overflow: hidden;
  }
  .podium-section h3 {
    text-align: center;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 28px;
  }
  .podium {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 6px;
  }
  .podium-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    max-width: 180px;
  }
  .podium-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 6px;
    color: var(--white);
  }
  .p1 .podium-avatar { background: var(--green-dark); width: 62px; height: 62px; font-size: 22px; }
  .p2 .podium-avatar { background: #6a7a8a; }
  .p3 .podium-avatar { background: #8a6a3a; }

  .podium-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 4px;
    text-align: center;
  }
  .p1 .podium-name { font-size: 15px; }
  .podium-pts {
    font-size: 12px;
    color: var(--gray);
    margin-bottom: 8px;
  }
  .podium-block {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    border-radius: 8px 8px 0 0;
    padding: 12px 0;
  }
  .p1 .podium-block { height: 100px; background: linear-gradient(180deg,#f0c04044,#f0c04022); border-top: 3px solid var(--gold); }
  .p2 .podium-block { height: 72px; background: linear-gradient(180deg,#c0c0c044,#c0c0c022); border-top: 3px solid var(--silver); }
  .p3 .podium-block { height: 54px; background: linear-gradient(180deg,#c8854a44,#c8854a22); border-top: 3px solid var(--bronze); }

  /* ─── RANK LIST ─── */
  .rank-section {
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .rank-header {
    display: grid;
    grid-template-columns: 44px 1fr 160px 56px;
    padding: 12px 20px;
    background: var(--dark);
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .rank-row {
    display: grid;
    grid-template-columns: 44px 1fr 160px 56px;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.1s;
  }
  .rank-row:last-child { border-bottom: none; }
  .rank-row:hover { background: var(--green-xlight); }
  .rank-pos {
    font-size: 15px;
    font-weight: 800;
    color: var(--gray);
    text-align: center;
  }
  .rank-pos.top { color: var(--dark); }
  .rank-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--dark);
  }
  .rank-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rank-bar-bg {
    flex: 1;
    height: 7px;
    border-radius: 4px;
    background: #e8e8e8;
    overflow: hidden;
  }
  .rank-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--green);
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .rank-pts {
    font-size: 15px;
    font-weight: 800;
    color: var(--green-dark);
    text-align: right;
    min-width: 28px;
  }

  /* ─── ZERO STATE ─── */
  .zero-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray);
  }
  .zero-state .z-icon { font-size: 40px; margin-bottom: 12px; }
  .zero-state p { font-size: 14px; max-width: 360px; margin: 0 auto; }

  /* ─── RELOAD BTN ─── */
  .reload-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .reload-wrap h2 {
    font-size: 18px;
    font-weight: 800;
    color: var(--white);
  }
  .reload-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green);
    color: var(--white);
    font-size: 13px;
    font-weight: 700;
    padding: 9px 18px;
    border-radius: 50px;
    cursor: pointer;
    border: none;
    transition: background 0.15s;
    letter-spacing: 0.3px;
  }
  .reload-btn:hover { background: var(--green-dark); }

  .progress-bar {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 4px;
    transition: width 0.5s;
  }

  @media (max-width: 600px) {
    .header { padding: 20px; flex-direction: column; gap: 16px; text-align: center; }
    .header-title { text-align: center; }
    .meta-bar { grid-template-columns: repeat(2,1fr); }
    .rank-header, .rank-row { grid-template-columns: 36px 1fr 100px 48px; padding: 12px 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <svg width="56" height="56" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="26" fill="#99c667" stroke="#6a9a3f" stroke-width="2"/>
      <text x="28" y="36" font-size="20" font-weight="bold" text-anchor="middle" fill="#fff" font-family="Arial">IZI</text>
    </svg>
  </div>
  <div class="header-title">
    <h1>🏆 Mondialito 2026</h1>
    <p>Classifica in tempo reale</p>
  </div>
</div>

<div class="main">

  <!-- LOADING -->
  <div class="loading" id="loading-section">
    <div class="spinner"></div>
    <p>Caricamento classifica...</p>
  </div>

  <!-- SCOREBOARD -->
  <div id="scoreboard">
    <div class="reload-wrap">
      <h2>📊 Classifica aggiornata</h2>
      <button class="reload-btn" id="reload-btn">🔄 Ricarica</button>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>

    <div class="meta-bar" id="meta-bar"></div>
    <div id="podium-wrap"></div>

    <div class="rank-section" id="rank-section">
      <div class="rank-header">
        <span>Pos.</span>
        <span>Giocatore</span>
        <span>Punti</span>
        <span style="text-align:right">Pt</span>
      </div>
      <div id="rank-list"></div>
    </div>
  </div>

</div>

<script>

function initials(name) {
  return name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
}

// Load data from GitHub
async function loadExcelFromGitHub() {
  const url = 'https://raw.githubusercontent.com/neker97/mondialito-izi/main/html-files/DEF_Mondiali_2026_MASTER.xlsx?t=' + Date.now();
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error('File not found');
    const arrayBuffer = await response.arrayBuffer();
    parseAndRender(arrayBuffer);
  } catch (error) {
    showError('Errore nel caricamento del file');
    console.error(error);
  }
}

function parseAndRender(arrayBuffer) {
  try {
    const wb = XLSX.read(arrayBuffer, {type:'array', cellFormula:false});
    const ws = wb.Sheets['Previsioni partecipanti'];
    if (!ws) throw new Error('Foglio "Previsioni partecipanti" non trovato.');
    const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
    const row0 = data[0] || [];
    const SKIP = new Set(['#','Data','Orario (IT)','Girone','Squadra Casa','Squadra Ospite','Esito']);
    const players = [];
    for (let i = 0; i < row0.length; i++) {
      if (typeof row0[i] === 'string' && !SKIP.has(row0[i])) {
        const pts = typeof row0[i+1] === 'number' ? row0[i+1] : 0;
        players.push({name: row0[i], pts});
        i++;
      }
    }
    if (!players.length) throw new Error('Nessun giocatore trovato.');
    let esiti = 0;
    for (let r = 2; r < data.length; r++) {
      if (data[r] && data[r][6] != null && data[r][6] !== '') esiti++;
    }
    players.sort((a,b) => b.pts - a.pts || a.name.localeCompare(b.name));
    render(players, esiti);
  } catch(err) { showError(err.message); }
}

function render(players, esiti) {
  document.getElementById('loading-section').style.display = 'none';
  document.getElementById('scoreboard').style.display = 'block';

  const total = 72;
  const maxPts = players[0]?.pts || 1;
  const allZero = players.every(p => p.pts === 0);

  // progress
  document.getElementById('prog-fill').style.width = Math.round((esiti/total)*100) + '%';

  // meta cards
  document.getElementById('meta-bar').innerHTML = [
    ['Partecipanti', players.length, '👥'],
    ['Partite giocate', esiti, '⚽'],
    ['Partite totali', total, '📋'],
    ['Punteggio max', maxPts, '🌟'],
  ].map(([label,val,icon]) => `
    <div class="meta-card">
      <div class="mc-val">${icon} ${val}</div>
      <div class="mc-label">${label}</div>
    </div>`).join('');

  // podium
  const podiumWrap = document.getElementById('podium-wrap');
  if (!allZero && players.length >= 1) {
    const top = [players[1]||null, players[0], players[2]||null];
    const cls = ['p2','p1','p3'];
    const medals = ['🥈','🥇','🥉'];
    podiumWrap.innerHTML = `
      <div class="podium-section">
        <h3>Podio</h3>
        <div class="podium">
          ${top.map((p,i) => p ? `
            <div class="podium-slot ${cls[i]}">
              <div class="podium-avatar">${initials(p.name)}</div>
              <div class="podium-name">${p.name}</div>
              <div class="podium-pts">${p.pts} pt</div>
              <div class="podium-block">${medals[i]}</div>
            </div>` : `<div class="podium-slot ${cls[i]}"></div>`).join('')}
        </div>
      </div>`;
  } else {
    podiumWrap.innerHTML = '';
  }

  // rank list
  const startIdx = allZero ? 0 : 3;
  document.getElementById('rank-list').innerHTML = players.slice(startIdx).map((p, i) => {
    const pos = startIdx + i + 1;
    const pct = maxPts > 0 ? Math.round((p.pts/maxPts)*100) : 0;
    const topCls = pos <= 3 ? 'top' : '';
    return `<div class="rank-row">
      <span class="rank-pos ${topCls}">${pos}</span>
      <span class="rank-name">${p.name}</span>
      <div class="rank-bar-wrap">
        <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <span class="rank-pts">${p.pts}</span>
    </div>`;
  }).join('') || (allZero ? `<div class="zero-state">
    <div class="z-icon">⏳</div>
    <p>Nessuna partita ancora giocata.</p>
  </div>` : '');
}

function showError(msg) {
  document.getElementById('loading-section').innerHTML = `<div style="color: #ff6b6b; text-align: center; padding: 40px;"><p>⚠️ ${msg}</p></div>`;
}

document.getElementById('reload-btn').addEventListener('click', loadExcelFromGitHub);

// Load on page init
window.addEventListener('load', loadExcelFromGitHub);
</script>
</body>
</html>
